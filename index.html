<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpamCrusher – Legal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F2F3F8;
      color: #1A1A2E;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #FFFFFF;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(91, 79, 207, 0.10);
      text-align: center;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #6750E4, #9333EA);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg {
      width: 28px;
      height: 28px;
      fill: #FFFFFF;
    }

    .app-name {
      font-size: 24px;
      font-weight: 700;
      color: #1A1A2E;
      letter-spacing: -0.3px;
    }

    .tagline {
      font-size: 14px;
      color: #4B5563;
      margin-bottom: 36px;
    }

    .divider {
      height: 1px;
      background: #E5E7EB;
      margin-bottom: 32px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #4B5563;
      margin-bottom: 16px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      border-radius: 12px;
      text-decoration: none;
      background: #F2F3F8;
      border: 1.5px solid #E5E7EB;
      transition: border-color 0.15s, background 0.15s;
    }

    .link-btn:hover {
      border-color: #5B4FCF;
      background: #EDE7F6;
    }

    .link-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-icon.purple {
      background: linear-gradient(135deg, #5B4FCF, #7B6FE0);
    }

    .link-icon.orange {
      background: linear-gradient(135deg, #F97316, #FBBF24);
    }

    .link-icon svg {
      width: 18px;
      height: 18px;
      fill: #FFFFFF;
    }

    .link-text {
      text-align: left;
    }

    .link-title {
      font-size: 15px;
      font-weight: 600;
      color: #1A1A2E;
      display: block;
    }

    .link-sub {
      font-size: 12px;
      color: #4B5563;
      display: block;
      margin-top: 2px;
    }

    .arrow {
      margin-left: auto;
      color: #4B5563;
      font-size: 18px;
    }

    footer {
      margin-top: 28px;
      font-size: 12px;
      color: #4B5563;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo-wrap">
      <div class="logo-icon">
        <!-- Shield icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L4 5v6c0 5.25 3.4 10.15 8 11.38C16.6 21.15 20 16.25 20 11V5l-8-3z"/>
        </svg>
      </div>
      <span class="app-name">SpamCrusher</span>
    </div>
    <p class="tagline">Block spam calls. Protect your privacy.</p>

    <div class="divider"></div>

    <p class="section-title">Legal Documents</p>

    <div class="links">
      <a href="privacy-policy.html" class="link-btn">
        <div class="link-icon purple">
          <!-- Document icon -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM6 20V4h5v7h7v9H6z"/>
          </svg>
        </div>
        <div class="link-text">
          <span class="link-title">Privacy Policy</span>
          <span class="link-sub">How we collect and use your data</span>
        </div>
        <span class="arrow">›</span>
      </a>

      <a href="account-deletion.html" class="link-btn">
        <div class="link-icon orange">
          <!-- Person remove icon -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8zm10.8-3.6H18v1.2h4.8v-1.2z"/>
          </svg>
        </div>
        <div class="link-text">
          <span class="link-title">Account Deletion</span>
          <span class="link-sub">Request deletion of your account and data</span>
        </div>
        <span class="arrow">›</span>
      </a>
    </div>
  </div>

  <footer>© 2026 SpamCrusher. All rights reserved.</footer>

</body>
</html>
